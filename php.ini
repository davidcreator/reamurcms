; Basic Config
default_charset = UTF-8

; Engine
engine = On
short_open_tag = Off
precision = 14
output_buffering = 4096
zlib.output_compression = Off
implicit_flush = Off
unserialize_callback_func =
serialize_precision = -1
disable_functions =
disable_classes =
zend.enable_gc = On
expose_php = On
max_execution_time = 300
max_input_time = 300
max_input_vars = 3000
memory_limit = 512M
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
display_startup_errors = Off
log_errors = On
log_errors_max_len = 1024
ignore_repeated_errors = Off
ignore_repeated_source = Off
report_memleaks = On
html_errors = On
error_log =
variables_order = "GPCS"
request_order = "GP"
register_argc_argv = Off
auto_globals_jit = On
post_max_size = 70M
auto_prepend_file =
auto_append_file =
default_mimetype = "text/html"
default_charset = "UTF-8"
doc_root =
user_dir =
enable_dl = Off
file_uploads = On
upload_tmp_dir =
upload_max_filesize = 64M
max_file_uploads = 20
allow_url_fopen = On
allow_url_include = Off
default_socket_timeout = 60

; Date
date.timezone = UTC

; MySQL/Database Config
mysql.connect_timeout = 30
mysqli.default_socket = ""
mysqli.reconnect = On

; Security Config
allow_url_fopen   = Off
allow_url_include = Off
expose_php = Off
register_globals = Off
magic_quotes_gpc = Off

; Error Log Config
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRACATED & ~E_STRICT & ~E_NOTICE
error_log = "\\reamur\\system\\storage\\logs\\error.log"

; PCRE
pcre.backtrack_limit = 100000
pcre.recursion_limit = 100000

; Extensions
extension=curl
extension=gd
extension=zip
extension=fileinfo
extension=exif
extension=mysqli
extension=pdo_mysql
extension=mbstring
extension=openssl

; Specific settings for image processing
[GD]
; Enables image processing
gd.jpeg_ignore_warning = 1

; Memory settings for uploading large files
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; Output buffer settings
output_buffering = 4096
output_handler = ""
zlib.output_compression = Off

; Temporary files settings
sys_temp_dir = "\\reamur\\system\\storage\\temp"

; Session
session.save_handler = files
session.use_strict_mode = 0
session.use_cookies = 1
session.use_only_cookies = 1
session.name = PHPSESSID
session.auto_start = 0
session.cookie_lifetime = 0
session.cookie_path = /
session.cookie_domain =
session.cookie_httponly =
session.cookie_samesite =
session.serialize_handler = php
session.gc_probability = 0
session.gc_divisor = 1000
session.gc_maxlifetime = 1440
session.referer_check =
session.cache_limiter = nocache
session.cache_expire = 180
session.use_trans_sid = 0
session.sid_length = 26
session.trans_sid_tags = "a=href,area=href,frame=src,form="
session.sid_bits_per_character = 5

; OPcache
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 2
opcache.fast_shutdown = 1

; Specific settings for your project
; These are custom variables that you can use in PHP
; To access: ini_get('user.upload_image_path')
user.upload_image_path = "\\reamur\\system\\storage\\image\\upload"
user.upload_file_path = "\\reamur\\system\\storage\\upload"