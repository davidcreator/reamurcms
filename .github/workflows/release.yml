# .github/workflows/release.yml
# ReamurCMS — Release
#
# Triggered when a version tag (v*.*.*) is pushed.
# Creates a GitHub Release with auto-generated release notes and a zipped artifact.
#
# Usage:
#   git tag v2.0.0
#   git push origin v2.0.0

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'     # Matches: v1.0.0, v2.0.1, etc.
      - 'v[0-9]+.[0-9]+.[0-9]+-*'   # Matches: v1.0.0-beta, v2.0.0-rc1, etc.

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    permissions:
      contents: write # Required to create releases / Necessário para criar releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for release notes / Histórico completo para notas

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install production dependencies
        run: |
          if [ -f "system/storage/composer.json" ]; then
            cd system/storage
            composer install --no-progress --prefer-dist --optimize-autoloader --no-dev
            echo "✅ Production dependencies installed"
          fi

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

          # Determine if pre-release / Determina se é pré-release
          if [[ "$TAG" == *"-"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "📋 Pre-release detected: $TAG"
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "📋 Stable release: $TAG"
          fi

      - name: Build release artifact
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ARTIFACT="reamurcms-$TAG"

          echo "Building release artifact: $ARTIFACT.zip"

          # Create temp dir with clean copy
          mkdir -p /tmp/$ARTIFACT

          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.log' \
            --exclude='system/storage/vendor' \
            . /tmp/$ARTIFACT/

          cd /tmp
          zip -r $ARTIFACT.zip $ARTIFACT/

          mv /tmp/$ARTIFACT.zip ./

          echo "✅ Artifact created: $ARTIFACT.zip ($(du -sh $ARTIFACT.zip | cut -f1))"
          echo "artifact_name=$ARTIFACT.zip" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "ReamurCMS ${{ steps.version.outputs.tag }}"
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: true
          files: |
            ${{ env.artifact_name }}
          body: |
            ## 🚀 ReamurCMS ${{ steps.version.outputs.tag }}

            ### 📥 Installation

            Download the `reamurcms-${{ steps.version.outputs.tag }}.zip` artifact, extract it, and follow the [Installation Guide](https://github.com/davidcreator/reamurcms/blob/main/docs/INSTALLATION.md).

            Or clone directly:
            ```bash
            git clone --branch ${{ steps.version.outputs.tag }} https://github.com/davidcreator/reamurcms.git
            cd reamurcms/system/storage && composer install --no-dev
            ```

            ### 📋 Requirements
            - PHP 8.0+
            - MySQL 5.7+ or MariaDB 10.3+
            - Composer

            ### 🔗 Links
            - [Changelog](https://github.com/davidcreator/reamurcms/blob/main/docs/CHANGELOG.md)
            - [Installation Guide](https://github.com/davidcreator/reamurcms/blob/main/docs/INSTALLATION.md)
            - [Documentation](https://docs.reamurcms.com)

      - name: Post release summary
        run: |
          echo "## 🎉 Release Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field      | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version    | \`${{ steps.version.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Pre-release | ${{ steps.version.outputs.prerelease }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact   | \`${{ env.artifact_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit     | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
