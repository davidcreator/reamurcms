# .github/workflows/build.yml
# ReamurCMS — Build & Test Pipeline
#
# Jobs:
#   1. debug-info       → Shows environment and repo info
#   2. static-analysis  → PHP syntax check + Composer validation
#   3. build-and-test   → Matrix build (PHP 8.1, 8.2, 8.3) + MySQL
#   4. code-quality     → PHPStan / CS Fixer (PRs only)
#   5. deploy           → Notifies/triggers deploy (push to main only)
#
# ⚠️  FIX: deploy no longer depends on code-quality (which only runs on PRs).
#          It now depends only on build-and-test to avoid being permanently blocked.

name: Build & Test

on:
  push:
    branches: [ "main", "develop" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - 'docs/**'
  pull_request:
    branches: [ "main", "develop" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - 'docs/**'
  workflow_dispatch: # Allows manual execution / Permite execução manual

env:
  PHP_VERSION: '8.2'
  COMPOSER_PATH: 'system/storage'
  EXTENSIONS: 'mbstring, intl, pdo_mysql, gd, zip, curl, xml'

# ─────────────────────────────────────────────
# JOB 1 — Debug Information
# ─────────────────────────────────────────────
jobs:
  debug-info:
    name: Debug Information
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Show repository structure
        run: |
          echo "=== Repository Structure ==="
          ls -la
          echo ""
          echo "=== PHP files in repository ==="
          find . -name "*.php" -type f | head -20
          echo ""
          echo "=== Checking composer path ==="
          if [ -d "${{ env.COMPOSER_PATH }}" ]; then
            echo "✅ Composer path exists: ${{ env.COMPOSER_PATH }}"
            ls -la "${{ env.COMPOSER_PATH }}"
          else
            echo "❌ Composer path not found: ${{ env.COMPOSER_PATH }}"
            echo "Available composer.json locations:"
            find . -name "composer.json" -type f
          fi

      - name: Show workflow context
        run: |
          echo "=== Workflow Context ==="
          echo "Event:       ${{ github.event_name }}"
          echo "Branch/Ref:  ${{ github.ref }}"
          echo "Commit SHA:  ${{ github.sha }}"
          echo "Actor:       ${{ github.actor }}"
          echo "Run number:  ${{ github.run_number }}"

# ─────────────────────────────────────────────
# JOB 2 — Static Analysis
# ─────────────────────────────────────────────
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: debug-info

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: ${{ env.EXTENSIONS }}
          coverage: none
          tools: composer:v2

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Validate composer.json
        run: |
          if [ ! -f "${{ env.COMPOSER_PATH }}/composer.json" ]; then
            echo "❌ composer.json not found in ${{ env.COMPOSER_PATH }}"
            exit 1
          fi
          echo "✅ composer.json found"
          cd ${{ env.COMPOSER_PATH }}
          composer validate --strict --no-check-publish
          echo "✅ Composer validation passed"

      - name: Install dependencies (no-dev)
        run: |
          cd ${{ env.COMPOSER_PATH }}
          composer install --no-progress --prefer-dist --optimize-autoloader --no-dev
          echo "✅ Dependencies installed"
          echo "Installed packages:"
          composer show --installed --no-dev | head -10

      - name: PHP Syntax Check
        run: |
          echo "Starting PHP syntax check..."

          find . -type f -name "*.php" \
            -not -path "./vendor/*" \
            -not -path "./.git/*" \
            -not -path "./${{ env.COMPOSER_PATH }}/vendor/*" \
            > php_files.txt

          TOTAL=$(wc -l < php_files.txt)
          if [ "$TOTAL" -eq 0 ]; then
            echo "No PHP files found for syntax check"
            exit 0
          fi

          echo "Found $TOTAL PHP files to check"

          touch php-lint.log php-errors.log php-success.log
          LINT_ERRORS=0
          ERROR_FILES=()

          echo "=== PHP SYNTAX CHECK RESULTS ===" >> php-lint.log
          echo "Date: $(date)" >> php-lint.log
          echo "Total files: $TOTAL" >> php-lint.log
          echo "" >> php-lint.log

          while IFS= read -r file; do
            if php_output=$(php -l "$file" 2>&1); then
              echo "✅ OK: $file" >> php-success.log
            else
              echo "❌ ERROR: $file" | tee -a php-errors.log
              echo "$php_output" | sed 's/^/   /' | tee -a php-errors.log
              echo "" >> php-errors.log
              ERROR_FILES+=("$file")
              LINT_ERRORS=$((LINT_ERRORS + 1))
            fi
          done < php_files.txt

          echo ""
          echo "=== SUMMARY ==="
          echo "Total files checked : $TOTAL"
          echo "Files with errors   : $LINT_ERRORS"
          echo "Files without errors: $((TOTAL - LINT_ERRORS))"

          if [ "$LINT_ERRORS" -gt 0 ]; then
            echo ""
            echo "❌ PHP SYNTAX ERRORS FOUND in the following files:"
            for f in "${ERROR_FILES[@]}"; do echo "  - $f"; done
            echo ""
            echo "Run \`php -l <file>\` locally to reproduce."
            exit 1
          else
            echo ""
            echo "✅ All $TOTAL PHP files passed syntax check."
          fi

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: php-lint-results-${{ github.run_number }}
          path: |
            php-lint.log
            php-errors.log
            php-success.log
            php_files.txt
          retention-days: 30

      - name: Write error summary to GitHub Step Summary
        if: failure()
        run: |
          echo "## 🐛 PHP Syntax Errors Found" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f php-errors.log ] && [ -s php-errors.log ]; then
            echo "### Error Details:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -50 php-errors.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 💡 How to fix:" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the \`php-lint-results\` artifact" >> $GITHUB_STEP_SUMMARY
          echo "2. Check \`php-errors.log\` for details" >> $GITHUB_STEP_SUMMARY
          echo "3. Run \`php -l <filename>\` locally to test fixes" >> $GITHUB_STEP_SUMMARY

# ─────────────────────────────────────────────
# JOB 3 — Build & Test (matrix: PHP 8.1, 8.2, 8.3)
# ─────────────────────────────────────────────
  build-and-test:
    name: Build & Test (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    needs: [ debug-info, static-analysis ]

    strategy:
      fail-fast: false
      matrix:
        php-version: [ '8.1', '8.2', '8.3' ]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: reamurcms_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: ${{ env.EXTENSIONS }}
          coverage: xdebug
          tools: composer:v2

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php${{ matrix.php-version }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php${{ matrix.php-version }}-composer-
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: |
          cd ${{ env.COMPOSER_PATH }}
          composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Wait for MySQL
        run: |
          echo "Waiting for MySQL to be ready..."
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root -proot --silent 2>/dev/null; then
              echo "✅ MySQL is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Copy environment config
        run: |
          if [ -f config-dist.php ]; then
            cp config-dist.php config.php
            echo "✅ config.php created from config-dist.php"
          else
            echo "⚠️ config-dist.php not found — skipping"
          fi

      - name: Run PHPUnit tests
        run: |
          cd ${{ env.COMPOSER_PATH }}
          if [ -f "vendor/bin/phpunit" ]; then
            echo "Running PHPUnit..."
            vendor/bin/phpunit --testdox --coverage-clover=coverage.xml
          else
            echo "⚠️ PHPUnit not found — skipping unit tests"
            echo "   Add phpunit/phpunit to composer.json require-dev to enable tests."
          fi

      - name: Upload coverage to Codecov
        if: matrix.php-version == '8.2' && success()
        uses: codecov/codecov-action@v4
        with:
          file: ${{ env.COMPOSER_PATH }}/coverage.xml
          fail_ci_if_error: false
          verbose: false

# ─────────────────────────────────────────────
# JOB 4 — Code Quality (PRs only)
# ─────────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: [ debug-info, static-analysis ]
    # Only run on pull requests — avoids blocking push/deploy pipelines
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: ${{ env.EXTENSIONS }}
          tools: composer:v2, phpstan, php-cs-fixer

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-quality-${{ hashFiles('**/composer.lock') }}

      - name: Install dependencies
        run: |
          cd ${{ env.COMPOSER_PATH }}
          composer install --no-progress --prefer-dist

      # Uncomment and configure as needed / Descomente e configure conforme necessário:

      # - name: Run PHPStan
      #   run: |
      #     cd ${{ env.COMPOSER_PATH }}
      #     vendor/bin/phpstan analyse --error-format=github

      # - name: Run PHP CS Fixer (dry-run)
      #   run: |
      #     cd ${{ env.COMPOSER_PATH }}
      #     vendor/bin/php-cs-fixer fix --dry-run --diff --format=txt

      - name: Code quality placeholder
        run: |
          echo "✅ Code quality job ran successfully."
          echo "   Uncomment PHPStan / PHP CS Fixer steps above to enable checks."

# ─────────────────────────────────────────────
# JOB 5 — Deploy (push to main only)
# ─────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # ⚠️  Depends only on build-and-test (NOT code-quality which is PR-only)
    needs: [ build-and-test ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "🚀 Deploy pipeline triggered"
          echo "Branch : ${{ github.ref }}"
          echo "Commit : ${{ github.sha }}"
          echo "Actor  : ${{ github.actor }}"

